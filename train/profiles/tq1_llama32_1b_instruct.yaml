# TQ1_V healing profile for the canonical quant/quant_spec.md primary target.
name: tq1_llama32_1b_instruct
base_model: unsloth/Llama-3.2-1B-Instruct
teacher: unsloth/Llama-3.2-1B-Instruct

target_linear_regexes:
  - model\.layers\.\d+\.self_attn\.(q_proj|k_proj|v_proj|o_proj)
  - model\.layers\.\d+\.mlp\.(gate_proj|up_proj|down_proj)
keep_fp_regexes:
  - lm_head

freeze_fp_params: false
quant:
  scheme: tq1_v
  # Override this path with train.py --tq1-artifact for each immutable run.
  artifact: runs/llama32-1b-instruct-tq1-v12-ptq
  default_profile: tq1_v12-j-r
  default_codebook_id: llama32_v12j
  activation_mode: a8_token
  importance_stats: runs/llama32-1b-instruct.calibration.safetensors
  # One latent/payload serves token lookup and output logits. The statistics
  # artifact must include final-hidden sensitivity and token frequencies.
  shared_embedding_head: true
  shared_head_importance: 0.75
  shared_embedding_importance: 0.25
  qat_projection: soft
  candidate_count: 32
  top_m: 8
  assignment_chunk: 2048
  temperature_start: 1.0
  temperature_end: 0.05
  # Token-domain schedule. Every boundary is aligned for 1/2/4-process runs at
  # the canonical 131,072 tokens/process-step and fits inside the 200M budget.
  soft_tokens: 33554432
  hard_tokens: 134217728
  freeze_eval_every_tokens: 16777216
  freeze_indices_at_tokens: 167772160
  freeze_max_tokens: 184549376
  freeze_flip_threshold: 0.0001
  freeze_margin_threshold: 0.0
  freeze_sustain_evals: 3
  freeze_trend_tolerance: 0.01
  freeze_max_zero_fraction: 0.95
  freeze_max_scale_underflows: 0
  margin: 0.1
  lambda_margin: 0.01
  hidden_layers: [4, 8, 12, 16]
  lambda_hidden: 0.05
  tensor_overrides: []

export_route: [tq1_v]
eval_modes: [w_a8, w_only]
data:
  tokenizer: unsloth/Llama-3.2-1B-Instruct
  shard_set: llama32_instruct
