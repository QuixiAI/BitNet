# Track A1 — Llama-3.2-1B pathfinder (train_plan §2.2). The profile is the ONLY
# per-track truth: conversion, param groups, eval modes, export routes all read it.
name: a1
base_model: unsloth/Llama-3.2-1B
teacher: unsloth/Llama-3.2-1B

# Enumerate, don't assume: every nn.Linear must fullmatch exactly one list.
target_linear_regexes:
  - model\.layers\.\d+\.self_attn\.(q|k|v|o)_proj
  - model\.layers\.\d+\.mlp\.(gate|up|down)_proj
keep_fp_regexes:
  - lm_head                       # tied to embed_tokens; FP per §2.2 (exporters refuse to pack it)

freeze_fp_params: false           # A-track: tied embeddings stay trainable (§5.4)
quant: {granularity: tensor, group_k: 32}   # per-tensor absmean = §3.4 baseline;
                                            # group is the ablation path
export_route: [i2s_bitnet_cpp, tq2_upstream]
eval_modes: [w_a8, w_only]        # §8.4 pairing: w_a8 <-> I2_S, w_only <-> TQ2_0
data:
  tokenizer: unsloth/Llama-3.2-1B
  shard_set: llama3
